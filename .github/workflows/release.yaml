name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: |
          cd target/${{ matrix.target }}/release
          tar czf till-${{ matrix.target }}.tar.gz till
      - uses: actions/upload-artifact@v4
        with:
          name: till-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/till-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: till-*.tar.gz

  publish:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "aarch64=$(sha256sum till-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(sha256sum till-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate and push Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          SHA_AARCH64: ${{ steps.sha.outputs.aarch64 }}
          SHA_X86_64: ${{ steps.sha.outputs.x86_64 }}
        run: |
          VERSION="${TAG_NAME#v}"

          cat > till.rb << FORMULA
          class Till < Formula
            desc "Personal finance CLI for bank data"
            homepage "https://github.com/thrashr888/till"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/thrashr888/till/releases/download/${TAG_NAME}/till-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64}"
              end
              on_intel do
                url "https://github.com/thrashr888/till/releases/download/${TAG_NAME}/till-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64}"
              end
            end

            def install
              bin.install "till"
            end

            test do
              assert_match "till", shell_output("#{bin}/till --help")
            end
          end
          FORMULA

          git clone "https://x-access-token:${GH_TOKEN}@github.com/thrashr888/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          cp till.rb /tmp/homebrew-tap/Formula/till.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/till.rb
          git commit -m "Update till to ${TAG_NAME}"
          git push
